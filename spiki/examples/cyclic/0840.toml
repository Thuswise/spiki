<Broadstairs>   Do we have a stable representation of our situation? I'd like us to agree on
                [some sort of interpretation](1218.html).
<Chalgrove>     OK, here's what we know. A new word has appeared. And it is propagating everywhere.
<Appleby>       No, we need to think in terms of processes. Language is action.
<Chalgrove>     Action by whom?
<Appleby>       I don't know. But forget where you think you are.
                If I'm right we're experiencing some sort of poietic fruition.
<Broadstairs>   This is becoming a three pipe problem. I need to [reflect](5194.html) for a few minutes.
"""
